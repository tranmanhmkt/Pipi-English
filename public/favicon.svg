<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 -6 168 192" font-family="'Baloo 2','Comic Sans MS',cursive">
  <defs>
    <linearGradient id="gradY" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE894"/><stop offset="1" stop-color="#FFC93C"/>
    </linearGradient>
    <linearGradient id="gradP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF9DBE"/><stop offset="1" stop-color="#F26D9D"/>
    </linearGradient>
    <linearGradient id="gradCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B6FE0"/><stop offset="1" stop-color="#6F51CB"/>
    </linearGradient>
  </defs>

  <ellipse cx="90" cy="183" rx="46" ry="6.5" fill="#E8A8C4" opacity="0.3"/>

  <g>
    <!-- Cánh nhỏ hai bên -->
    <ellipse cx="34" cy="112" rx="11" ry="17" fill="#FFD34D" transform="rotate(-18 34 112)"/>
    <ellipse cx="146" cy="112" rx="11" ry="17" fill="#FFD34D" transform="rotate(18 146 112)"/>
    <!-- Đầu tròn — nâng cao, mặt lộ hẳn trên vỏ trứng -->
    <circle cx="90" cy="74" r="46" fill="url(#gradY)"/>
    <!-- Mũ kỷ yếu to bản đội lệch -->
    <g transform="rotate(-12 90 34)">
      <path d="M64 46 Q90 60 116 46 L116 30 Q90 44 64 30 Z" fill="#6A4FC0"/>
      <path d="M90 0 L150 22 L90 44 L30 22 Z" fill="url(#gradCap)" stroke="#5B41B0" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="90" cy="21" r="4.2" fill="#FFC93C"/>
      <path d="M90 21 Q122 18 146 23" stroke="#FFC93C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <line x1="146" y1="23" x2="146" y2="50" stroke="#FFC93C" stroke-width="4" stroke-linecap="round"/>
      <circle cx="146" cy="55" r="5.5" fill="#FFC93C"/>
    </g>
    <!-- Ánh sao lấp lánh -->
    <path d="M24 22 L26.4 29.6 L34 32 L26.4 34.4 L24 42 L21.6 34.4 L14 32 L21.6 29.6 Z" fill="#FFC93C"/>
    <path d="M40 8 L41.4 12.6 L46 14 L41.4 15.4 L40 20 L38.6 15.4 L34 14 L38.6 12.6 Z" fill="#FFDD75"/>
    <!-- Mắt to long lanh (lộ hẳn trên vỏ) -->
    <circle cx="74" cy="78" r="9.5" fill="#4A3B4E"/>
    <circle cx="77.2" cy="74.5" r="3.1" fill="#fff"/>
    <circle cx="71.5" cy="81.5" r="1.6" fill="#fff"/>
    <circle cx="106" cy="78" r="9.5" fill="#4A3B4E"/>
    <circle cx="109.2" cy="74.5" r="3.1" fill="#fff"/>
    <circle cx="103.5" cy="81.5" r="1.6" fill="#fff"/>
    <!-- Mỏ -->
    <path d="M83 89 Q90 84 97 89 Q90 98 83 89 Z" fill="#FF9D4D"/>
    <!-- Má hồng -->
    <circle cx="56" cy="89" r="8" fill="#FFB3C9" opacity="0.9"/>
    <circle cx="124" cy="89" r="8" fill="#FFB3C9" opacity="0.9"/>
  </g>

  <!-- Vỏ trứng — hạ thấp, chỉ ôm phần bụng -->
  <path d="M40 124 L57 104 L74 124 L90 102 L106 124 L123 104 L140 124
           C140 158 122 178 90 178 C58 178 40 158 40 124 Z"
        fill="#FFF9F0" stroke="#F0DCBE" stroke-width="3" stroke-linejoin="round"/>

    </g>
  <text x="330" y="106" font-size="44" font-weight="800" fill="#6B4A66">English</text>
</svg>
