<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 190" font-family="'Baloo 2','Comic Sans MS',cursive">
  <defs>
    <linearGradient id="gradY" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFEA9E"/><stop offset="1" stop-color="#FFC93C"/>
    </linearGradient>
    <linearGradient id="gradP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF9DBE"/><stop offset="1" stop-color="#F26D9D"/>
    </linearGradient>
  </defs>

  <!-- Bóng đổ -->
  <ellipse cx="95" cy="172" rx="50" ry="9" fill="#E8A8C4" opacity="0.28"/>

  <!-- Chú gà con (nhún nhảy trong vỏ trứng) -->
  <g class="chickG">
    <!-- Thân tròn mũm mĩm -->
    <circle cx="95" cy="96" r="55" fill="url(#gradY)"/>
    <!-- Cánh nhỏ giơ lên như vẫy chào -->
    <ellipse cx="42" cy="88" rx="14" ry="21" fill="#FFD34D" transform="rotate(-28 42 88)"/>
    <ellipse cx="148" cy="88" rx="14" ry="21" fill="#FFD34D" transform="rotate(28 148 88)"/>
    <!-- Mũ kỷ yếu (tốt nghiệp) đội lệch đáng yêu -->
    <g transform="rotate(-8 95 40)">
      <path d="M68 50 Q95 64 122 50 L122 35 Q95 48 68 35 Z" fill="#6A4FC0"/>
      <path d="M95 12 L150 31 L95 50 L40 31 Z" fill="#7A5CD6" stroke="#5B41B0" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="95" cy="31" r="4.2" fill="#FFC93C"/>
      <path d="M95 31 Q127 30 147 34" stroke="#FFC93C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <line x1="147" y1="34" x2="147" y2="57" stroke="#FFC93C" stroke-width="4" stroke-linecap="round"/>
      <circle cx="147" cy="62" r="5.5" fill="#FFC93C"/>
    </g>
    <!-- Mắt to long lanh 2 tia sáng -->
    <circle cx="77" cy="92" r="10" fill="#4A3B4E"/>
    <circle cx="80.5" cy="88" r="3.2" fill="#fff"/>
    <circle cx="74" cy="96" r="1.7" fill="#fff"/>
    <circle cx="113" cy="92" r="10" fill="#4A3B4E"/>
    <circle cx="116.5" cy="88" r="3.2" fill="#fff"/>
    <circle cx="110" cy="96" r="1.7" fill="#fff"/>
    <!-- Mỏ bé xíu -->
    <path d="M87 104 Q95 98 103 104 Q95 114 87 104 Z" fill="#FF9D4D"/>
    <!-- Má hồng -->
    <circle cx="60" cy="107" r="8.5" fill="#FFB3C9" opacity="0.9"/>
    <circle cx="130" cy="107" r="8.5" fill="#FFB3C9" opacity="0.9"/>
  </g>

  <!-- Vỏ trứng dưới (che phần thân dưới) -->
  <path d="M48 118 L61 104 L74 118 L87 104 L100 118 L113 104 L126 118 L142 118
           C142 152 122 170 95 170 C68 170 48 152 48 118 Z"
        fill="#FFF9EE" stroke="#F0DCBE" stroke-width="3" stroke-linejoin="round"/>

  <!-- Trang trí lấp lánh -->
  <text x="20" y="42" font-size="20">✨</text>
  <text x="158" y="150" font-size="16">💛</text>
  <text x="530" y="46" font-size="22">⭐</text>

  <!-- Bong bóng Abc -->
  <g>
    <rect x="168" y="16" width="84" height="44" rx="16" fill="#fff" stroke="#F6C6DC" stroke-width="3"/>
    <path d="M182 58 L171 74 L196 63 Z" fill="#fff" stroke="#F6C6DC" stroke-width="3" stroke-linejoin="round"/>
    <text x="210" y="47" text-anchor="middle" font-size="24" font-weight="800" letter-spacing="2">
      <tspan fill="#5FB8E8">A</tspan><tspan fill="#63C9A8">b</tspan><tspan fill="#FF9DBE">c</tspan>
    </text>
  </g>

  <!-- Wordmark -->
  <g transform="rotate(-3 316 84)">
    <rect x="256" y="60" width="120" height="62" rx="18" fill="#D14E81"/>
    <rect x="256" y="54" width="120" height="62" rx="18" fill="url(#gradP)"/>
    <text x="316" y="99" text-anchor="middle" font-size="42" font-weight="800" fill="#fff">PiPi</text>
  </g>
  <text x="392" y="102" font-size="44" font-weight="800" fill="#6B4A66">English</text>
</svg>
