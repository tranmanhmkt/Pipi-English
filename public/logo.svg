<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 190" font-family="'Baloo 2','Comic Sans MS',cursive">
  <defs>
    <linearGradient id="gradY" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE894"/><stop offset="1" stop-color="#FFC93C"/>
    </linearGradient>
    <linearGradient id="gradP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF9DBE"/><stop offset="1" stop-color="#F26D9D"/>
    </linearGradient>
    <linearGradient id="gradCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B6FE0"/><stop offset="1" stop-color="#6F51CB"/>
    </linearGradient>
  </defs>

  <!-- Bóng đổ -->
  <ellipse cx="90" cy="177" rx="46" ry="7" fill="#E8A8C4" opacity="0.3"/>

  <g class="chickG">
    <!-- Cánh nhỏ hai bên -->
    <ellipse cx="35" cy="106" rx="11" ry="17" fill="#FFD34D" transform="rotate(-18 35 106)"/>
    <ellipse cx="145" cy="106" rx="11" ry="17" fill="#FFD34D" transform="rotate(18 145 106)"/>
    <!-- Đầu / thân tròn -->
    <circle cx="90" cy="86" r="48" fill="url(#gradY)"/>
    <!-- Mũ kỷ yếu to bản đội lệch -->
    <g transform="rotate(-12 90 40)">
      <path d="M62 54 Q90 68 118 54 L118 36 Q90 50 62 36 Z" fill="#6A4FC0"/>
      <path d="M90 6 L152 28 L90 52 L28 28 Z" fill="url(#gradCap)" stroke="#5B41B0" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="90" cy="27" r="4.2" fill="#FFC93C"/>
      <path d="M90 27 Q124 23 148 29" stroke="#FFC93C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <line x1="148" y1="29" x2="148" y2="56" stroke="#FFC93C" stroke-width="4" stroke-linecap="round"/>
      <circle cx="148" cy="61" r="5.5" fill="#FFC93C"/>
    </g>
    <!-- Ánh sao lấp lánh cạnh mũ -->
    <path d="M26 26 L28.4 33.6 L36 36 L28.4 38.4 L26 46 L23.6 38.4 L16 36 L23.6 33.6 Z" fill="#FFC93C"/>
    <path d="M42 12 L43.4 16.6 L48 18 L43.4 19.4 L42 24 L40.6 19.4 L36 18 L40.6 16.6 Z" fill="#FFDD75"/>
    <!-- Mắt to long lanh -->
    <circle cx="74" cy="90" r="9.5" fill="#4A3B4E"/>
    <circle cx="77.2" cy="86.5" r="3.1" fill="#fff"/>
    <circle cx="71.5" cy="93.5" r="1.6" fill="#fff"/>
    <circle cx="106" cy="90" r="9.5" fill="#4A3B4E"/>
    <circle cx="109.2" cy="86.5" r="3.1" fill="#fff"/>
    <circle cx="103.5" cy="93.5" r="1.6" fill="#fff"/>
    <!-- Mỏ bé xíu -->
    <path d="M83 101 Q90 96 97 101 Q90 110 83 101 Z" fill="#FF9D4D"/>
    <!-- Má hồng -->
    <circle cx="56" cy="101" r="8" fill="#FFB3C9" opacity="0.9"/>
    <circle cx="124" cy="101" r="8" fill="#FFB3C9" opacity="0.9"/>
  </g>

  <!-- Vỏ trứng răng cưa to -->
  <path d="M38 114 L55 93 L72 114 L90 91 L108 114 L125 93 L142 114
           C142 152 124 173 90 173 C56 173 38 152 38 114 Z"
        fill="#FFF9F0" stroke="#F0DCBE" stroke-width="3" stroke-linejoin="round"/>

  <!-- Tên web ngay sau logo (kiểu tiêu đề) -->
  <g transform="rotate(-3 255 90)">
    <rect x="196" y="64" width="118" height="60" rx="18" fill="#D14E81"/>
    <rect x="196" y="58" width="118" height="60" rx="18" fill="url(#gradP)"/>
    <text x="255" y="101" text-anchor="middle" font-size="41" font-weight="800" fill="#fff">PiPi</text>
  </g>
  <text x="330" y="104" font-size="44" font-weight="800" fill="#6B4A66">English</text>
</svg>
