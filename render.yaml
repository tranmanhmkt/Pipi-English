# Render tự đọc file này khi tạo Blueprint (New > Blueprint)
services:
  - type: web
    name: pipi-english
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22.16.0"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAILS
        sync: false        # email admin của bạn, vd: ban@gmail.com (nhiều email cách nhau dấu phẩy)
      - key: GOOGLE_CLIENT_ID
        sync: false        # từ Google Cloud Console
      - key: SEPAY_BANK
        sync: false        # tên ngân hàng nhận tiền, vd: MBBank / VCB / ACB / TPBank...
      - key: SEPAY_ACC
        sync: false        # số tài khoản nhận tiền
      - key: SEPAY_API_KEY
        sync: false        # API Key webhook tạo trong my.sepay.vn (để trống 3 biến SePay = chế độ demo)
      - key: BASE_URL
        sync: false        # https://ten-app.onrender.com
      - key: PRO_PRICE
        value: "299000"
